<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcular Frete - Los Docitos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="checkout-page">
        <section class="checkout-card">
            <h1>Calcular frete</h1>
            <p>Preencha os dados do endereço para calcular o valor do frete.</p>

            <form id="frete-form" class="frete-form">
                <label for="cep">CEP</label>
                <input id="cep" type="text" placeholder="Digite o CEP" required>

                <label for="bairro">Bairro</label>
                <input id="bairro" type="text" placeholder="Digite o bairro" required>

                <label for="rua">Rua</label>
                <input id="rua" type="text" placeholder="Digite a rua" required>

                <label for="numero">Número</label>
                <input id="numero" type="text" placeholder="Digite o número" required>

                <label for="complemento">Complemento</label>
                <input id="complemento" type="text" placeholder="Digite o complemento">

                <label for="referencia">Referência (opcional)</label>
                <input id="referencia" type="text" placeholder="Digite uma referência">

                <button type="submit">Calcular frete</button>
            </form>

            <div id="frete-result" class="frete-result" aria-live="polite"></div>

            <div id="resumo-pedido" class="resumo-pedido" style="display: none;">
                <h2>Resumo do pedido</h2>
                <ul id="carrinho-resumo"></ul>
                <div class="resumo-total">
                    <p><strong>Subtotal (produtos):</strong> <span id="subtotal-value">R$ 0,00</span></p>
                    <p><strong>Frete:</strong> <span id="frete-value">R$ 0,00</span></p>
                    <p class="total-final"><strong>Total:</strong> <span id="total-final">R$ 0,00</span></p>
                </div>
            </div>

            <a class="buy-now-btn" id="confirmar-btn" href="compra.html">Confirmar pedido</a>
            <a class="back-link" href="index.html">Voltar para a página inicial</a>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
